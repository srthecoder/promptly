<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Promptly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #fff;
      color: #1a1a1a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 16px;
      background: #D85A30;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      flex: 1;
      letter-spacing: .01em;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }
    .status-dot.ok  { background: #4ade80; }
    .status-dot.err { background: #fca5a5; }
    .status-label {
      font-size: 11px;
      color: rgba(255,255,255,0.8);
    }

    /* ── Body ── */
    .body {
      background: #FFF8F6;
      padding: 15px 16px 16px;
    }

    .field { margin-bottom: 13px; }

    label {
      display: block;
      font-size: 11px;
      color: #993C1D;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    input[type="password"] {
      width: 100%;
      background: #fff;
      border: 1px solid rgba(216,90,48,0.3);
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 13px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="password"]:focus {
      border-color: #D85A30;
      box-shadow: 0 0 0 3px rgba(216,90,48,0.12);
    }

    .row-inline {
      display: flex;
      gap: 7px;
      align-items: stretch;
    }
    .row-inline input { flex: 1; min-width: 0; }

    .btn-save {
      padding: 9px 18px;
      background: #D85A30;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-save:hover { background: #bf4e27; }

    .save-feedback {
      font-size: 11px;
      color: #D85A30;
      margin-top: 4px;
      min-height: 15px;
      opacity: 0;
      transition: opacity .2s;
    }
    .save-feedback.show { opacity: 1; }

    /* ── Shortcut hint ── */
    .hint {
      padding: 10px 12px;
      background: rgba(216,90,48,0.06);
      border: 1px solid rgba(216,90,48,0.15);
      border-radius: 8px;
      font-size: 12px;
      color: #712B13;
      line-height: 1.5;
    }
    .hint kbd {
      display: inline-block;
      background: rgba(216,90,48,0.1);
      border: 1px solid rgba(216,90,48,0.25);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10.5px;
      color: #993C1D;
      font-family: monospace;
    }

    /* ── Footer ── */
    .footer {
      padding: 9px 16px 13px;
      background: #FFF8F6;
      border-top: 1px solid rgba(216,90,48,0.1);
    }
    .footer a {
      font-size: 12px;
      color: #D85A30;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <div style="width:28px;height:28px;border-radius:8px;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="16" viewBox="0 0 18 16" fill="none">
        <rect x="0.5" y="0.5" width="17" height="11" rx="3" fill="#D85A30"/>
        <circle cx="6"  cy="6" r="1.5" fill="white"/>
        <circle cx="12" cy="6" r="1.5" fill="white"/>
        <path d="M4 14l3.5-3h6" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="header-title">Promptly</span>
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="server-status">checking…</span>
  </div>

  <div class="body">
    <div class="hint">
      Press <kbd>⌘⇧P</kbd> on Claude, ChatGPT, or Gemini to restructure the current prompt into a token-efficient format.
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/anthropics/promptly" target="_blank">github.com/anthropics/promptly</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
