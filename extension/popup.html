<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Promptly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #fff;
      color: #1a1a1a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 18px;
      background: #D85A30;
    }
    .header-title {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      flex: 1;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      flex-shrink: 0;
    }
    .status-dot.ok  { background: #4ade80; }
    .status-dot.err { background: #fca5a5; }
    .status-label {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
    }

    /* ── Body ── */
    .body {
      background: #FFF8F6;
      padding: 16px 18px 18px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      color: #993C1D;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="password"],
    select {
      width: 100%;
      background: #fff;
      border: 1px solid rgba(216, 90, 48, 0.3);
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 13px;
      font-family: inherit;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="password"]:focus,
    select:focus {
      border-color: #D85A30;
      box-shadow: 0 0 0 3px rgba(216,90,48,0.12);
    }
    select { cursor: pointer; }

    .row-inline {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .row-inline input { flex: 1; min-width: 0; }

    .btn-save {
      padding: 9px 20px;
      background: #D85A30;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-save:hover { background: #bf4e27; }

    .save-feedback {
      font-size: 11px;
      color: #D85A30;
      margin-top: 5px;
      min-height: 15px;
      opacity: 0;
      transition: opacity .2s;
    }
    .save-feedback.show { opacity: 1; }

    /* ── Shortcut hint ── */
    .hint {
      margin-top: 4px;
      padding: 10px 14px;
      background: rgba(216, 90, 48, 0.06);
      border: 1px solid rgba(216, 90, 48, 0.15);
      border-radius: 8px;
      font-size: 12px;
      color: #712B13;
      line-height: 1.5;
    }
    .hint kbd {
      display: inline-block;
      background: rgba(216,90,48,0.1);
      border: 1px solid rgba(216,90,48,0.25);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10.5px;
      color: #993C1D;
      font-family: monospace;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 18px 14px;
      background: #FFF8F6;
      border-top: 1px solid rgba(216,90,48,0.1);
    }
    .footer a {
      font-size: 12px;
      color: #D85A30;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <img src="icon48.png" width="24" height="24" style="border-radius:6px; flex-shrink:0;">
    <span class="header-title">Promptly</span>
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">no key</span>
  </div>

  <div class="body">
    <div class="field">
      <label>Groq API key</label>
      <div class="row-inline">
        <input type="password" id="api-key" placeholder="gsk_…" autocomplete="off" />
        <button class="btn-save" id="save-btn">Save</button>
      </div>
      <div class="save-feedback" id="save-feedback">Saved ✓</div>
    </div>

    <div class="field">
      <label>Default mode</label>
      <select id="mode-select">
        <option value="cost_min">💰 Cost Minimizer</option>
        <option value="concise">⚡ Concise Answer</option>
        <option value="deep_research">🔬 Deep Research</option>
        <option value="code_gen">💻 Code Generation</option>
      </select>
    </div>

    <div class="hint">
      Press <kbd>Ctrl+Shift+P</kbd> (<kbd>⌘⇧P</kbd> on Mac) on Claude or ChatGPT to optimize the current prompt.
    </div>
  </div>

  <div class="footer">
    <a href="https://console.groq.com" target="_blank">Get free key → console.groq.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
